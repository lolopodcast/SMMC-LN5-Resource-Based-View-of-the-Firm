    m3_nav: "3. 組織能力與價值鏈",
    m3_title: "組織能力與價值鏈",
    m3_p1: "資源本身不會創造價值。腦外科醫生若沒有麻醉師、護理師和影像設備，就無法執行手術。組織能力（Organizational Capability）是「企業為達成預期成果而部署資源的能力」（Helfat & Lieberman）。關鍵區分：資源是企業「擁有」的東西；能力是企業「能做」的事情。",
    m3_p2: "「每一項組織能力的基礎，都是組織成員之間的協調行為。」——Grant",
    m3_p3: "Porter 的價值鏈提供了辨識能力的系統性架構。能力的層級從底層到頂層：專業化/單一任務能力（如自動波焊）→ 活動相關能力（如物料管理）→ 廣泛功能能力（如營運管理）→ 跨功能能力（如新產品開發）。卓越績效來自在較高層級的獨特能力組合，而非單一資源的堆疊。",
    m3_cards: [
      { title: "能力 ≠ 資源的總和", desc: "資源豐富的球隊（切爾西、皇馬）經常被資源較少但能力更強的球隊擊敗（多特蒙德、兵工廠）。商業上亦然：資源有限的新創企業透過卓越的能力擊敗資源豐富的巨頭（Dyson vs. Electrolux、現代 vs. 豐田）。" },
      { title: "價值鏈作為能力地圖", desc: "價值鏈將企業解剖為主要活動（進貨物流、生產作業、出貨物流、行銷銷售、售後服務）與支援活動（企業基礎設施、人力資源、技術發展、採購）。每項活動都是潛在的競爭優勢來源。" }
    ],
    m3_case_title: "微個案：鴻海（Foxconn）——製造能力作為策略資產",
    m3_case: "鴻海的有形資源令人印象深刻：120 萬名員工、全球 30 多個製造基地、先進的自動化設備。但鴻海的真正優勢在於組織能力：精密製造流程、即時物流系統、快速擴產能力。其跨功能能力尤為突出——能在數週內將 iPhone 產量從 0 提升至每天 50 萬台。這不僅僅是機器設備的問題，而是採購、製程工程、品質管理與人力資源系統的協調整合。鴻海的能力具有明顯的路徑依賴性（40 年以上的製造知識累積），且具備社會複雜性（供應商關係網絡、員工默會知識）。這就是為什麼 Apple 雖然對供應鏈集中有顧慮，卻無法輕易替換鴻海。",
    m3_case_lesson: "啟示：鴻海說明了組織能力（而非資源本身）才是競爭優勢的真正來源。其製造能力是 Apple 硬體策略得以實現的關鍵——能力無法用金錢直接購買，只能透過長期的組織學習與協調來建構。",
    m3_terms: [
      { front: "組織能力 Organizational Capability", back: "企業為達成預期成果而部署資源的能力。能力不等於資源的簡單加總，而是組織成員之間協調行為的產物。它反映了企業「能做什麼」而非「擁有什麼」。" },
      { front: "價值鏈 Value Chain", back: "Porter 提出的分析工具，將企業活動分為主要活動（進貨、生產、出貨、行銷、服務）與支援活動（基礎設施、HR、技術、採購），用以辨識每項活動中的競爭優勢來源。" },
      { front: "能力層級 Capability Hierarchy", back: "從底層到頂層：專業化能力 → 活動相關能力 → 功能能力 → 跨功能能力。層級越高的能力越難模仿，但也越難管理與發展。" }
    ],
    m3_q: [
      { q: "資源與能力的關鍵區別是什麼？", opts: ["資源比能力更重要","資源是企業擁有的，能力是企業能做的","兩者完全相同","能力只存在於製造業"], ans: 1, exp: "資源是投入要素（企業擁有的資產），能力是企業將資源轉化為成果的行動力。" },
      { q: "Grant 認為組織能力的基礎是什麼？", opts: ["先進技術","充足資金","組織成員間的協調行為","市場佔有率"], ans: 2, exp: "Grant 強調：每一項組織能力的基礎都是組織成員之間的協調行為——能力本質上是組織性的。" },
      { q: "在能力層級中，最高層級是什麼？", opts: ["專業化能力","功能能力","跨功能能力","活動相關能力"], ans: 2, exp: "跨功能能力（如新產品開發）是最高層級，整合多個功能部門，最難模仿但也最有策略價值。" },
      { q: "價值鏈的「主要活動」不包括下列何者？", opts: ["生產作業","行銷銷售","人力資源管理","售後服務"], ans: 2, exp: "人力資源管理屬於支援活動。主要活動包括：進貨物流、生產作業、出貨物流、行銷銷售、售後服務。" },
      { q: "鴻海的核心競爭優勢主要來自什麼？", opts: ["廉價勞動力","組織層級的製造能力","政府補貼","品牌效應"], ans: 1, exp: "鴻海的優勢不僅在於設備或人力，而在於將採購、製程、品管、HR 系統協調整合的組織能力。" },
      { q: "為什麼「資源豐富」不等於「能力強大」？", opts: ["資源不重要","需要協調與整合才能轉化為能力","資源會貶值","能力不需要資源"], ans: 1, exp: "球隊例子說明：即使擁有最貴的球員（資源），沒有協調配合（能力），也無法贏得比賽。" },
      { q: "下列何者是跨功能能力的例子？", opts: ["自動焊接","倉儲管理","新產品開發","會計處理"], ans: 2, exp: "新產品開發需要 R&D、行銷、生產、財務等多個功能部門的協調，是典型的跨功能能力。" },
      { q: "Apple 為何難以替換鴻海？", opts: ["合約限制","鴻海的製造能力具路徑依賴與社會複雜性","鴻海價格最低","法律限制"], ans: 1, exp: "鴻海 40 年累積的製造知識（路徑依賴）與供應商關係網絡（社會複雜性）難以被其他廠商複製。" }
    ],

    // M4
    m4_nav: "4. VRIN/VRIO 評估",
    m4_title: "評估資源與能力（VRIN/VRIO）",
    m4_p1: "辨識資源只是第一步。評估資源需要回答兩個問題：（1）這項資源的策略重要性有多高？（2）相對於競爭者的強度如何？Grant 的架構從三個面向評估策略重要性：建立競爭優勢的潛力（相關性、稀缺性）、維持優勢（耐久性、可轉移性、可複製性）、以及佔有回報（財產權、議價力、嵌入性）。",
    m4_p2: "「資源基礎觀對企業策略制定有深遠的含義。當策略的首要關注是產業定位時，首要任務是選擇一個產業。」——Grant",
    m4_p3: "Grant 的架構產生一個 2×2 矩陣：策略重要性 × 相對強度。關鍵優勢（高重要性、高強度）應積極部署；關鍵劣勢（高重要性、低強度）需要緊急行動——透過改善、外包或巧妙策略來克服。例如 Harley-Davidson 面對技術劣勢時，選擇將品牌定位於「經典美式文化」而非「技術領先」，巧妙規避了弱點。",
    m4_cards: [
      { title: "Grant vs. Barney：兩套架構，相同目標", desc: "Grant 架構：相關性、稀缺性、耐久性、可轉移性、可複製性、財產權、議價力、嵌入性。Barney VRIO：有價值、稀有、不可模仿、有組織。兩者都評估競爭優勢潛力，但 Grant 額外強調耐久性與回報佔有。" },
      { title: "回報佔有：誰拿走了租金？", desc: "投資銀行（如 Goldman Sachs）有出色的能力——但員工往往佔有比股東更多的價值。能力越依附於個人，員工的議價力越強。這解釋了為什麼許多企業強調團隊能力而非個人明星。" }
    ],
    m4_case_title: "微個案：台積電——完美的 VRIN 資源分析",
    m4_case: "以 VRIN 架構分析台積電的先進製程能力：Valuable（有價值）——3nm/2nm 製程生產的晶片驅動所有主要 AI 工作負載，直接回應客戶最關鍵的需求。Rare（稀有）——全球僅台積電和三星能製造先進節點晶片，但只有台積電在規模化生產中保持獲利。Inimitable（難以模仿）——路徑依賴（30 年以上與 ASML、應用材料等共同開發的製程 R&D）、因果模糊（良率成功是上千個變數的複雜組合）、社會複雜性（數十年純代工模式建立的客戶信任）。Non-substitutable（不可替代）——前沿 AI 晶片沒有替代製造途徑。結果：台積電 2024 年毛利率超過 53%，賺取競爭對手無法匹配的 Ricardian 租金。",
    m4_case_lesson: "啟示：台積電是 VRIN 分析的教科書案例——每一個維度都滿足，因此享有極高的可持續競爭優勢。這也說明了為什麼台積電的「護城河」如此難以攻破。",
    m4_terms: [
      { front: "VRIN 架構", back: "Barney 提出的資源評估架構：Valuable（有價值）、Rare（稀有）、Inimitable（難以模仿）、Non-substitutable（不可替代）。四項條件全部滿足時，資源能授予持久競爭優勢。" },
      { front: "耐久性 Durability", back: "Grant 架構中的關鍵維度：資源能維持多久而不貶值？品牌聲譽可能持續數十年，但技術資源在快速變遷的產業中可能迅速過時。耐久性越高，競爭優勢越持久。" },
      { front: "回報佔有 Appropriability", back: "誰能從資源創造的價值中獲利？取決於財產權的明確程度、關鍵員工的議價力、以及能力在組織中的嵌入程度。能力越依附個人，企業佔有回報越困難。" }
    ],
    m4_q: [
      { q: "Grant 評估資源策略重要性的三個面向是什麼？", opts: ["規模、範疇、速度","建立優勢、維持優勢、佔有回報","成本、品質、創新","市場、技術、組織"], ans: 1, exp: "Grant 從三面向評估：建立競爭優勢的潛力、維持優勢的能力、佔有回報的可能性。" },
      { q: "在 Grant 的 2×2 矩陣中，「高策略重要性、低相對強度」的區域代表什麼？", opts: ["關鍵優勢","關鍵劣勢","超額資源","無關痛癢"], ans: 1, exp: "這代表關鍵劣勢——該資源對競爭很重要，但企業在此落後，需要緊急改善或策略性規避。" },
      { q: "Harley-Davidson 如何克服技術劣勢？", opts: ["大量投資技術","將品牌定位於美式文化而非技術","放棄市場","收購技術公司"], ans: 1, exp: "Harley-Davidson 不試圖在技術上追趕日本車廠，而是將弱點轉化為優勢——老式技術成為品牌「經典」魅力的一部分。" },
      { q: "台積電的先進製程能力滿足 VRIN 哪些條件？", opts: ["僅 V 和 R","僅 V、R 和 I","四項全部（V、R、I、N）","僅 V"], ans: 2, exp: "台積電的先進製程同時滿足有價值、稀有、難以模仿（路徑依賴+因果模糊+社會複雜）與不可替代。" },
      { q: "為什麼投資銀行的股東回報可能低於預期？", opts: ["產業不景氣","關鍵員工佔有大量價值","技術過時","客戶流失"], ans: 1, exp: "投資銀行的能力高度依附個人，明星交易員和分析師的議價力極強，佔走了大量經濟租金。" },
      { q: "Grant 與 Barney 架構的主要差異是什麼？", opts: ["完全不同的理論","Grant 額外強調耐久性與回報佔有","Barney 架構更全面","沒有差異"], ans: 1, exp: "兩者都評估競爭優勢潛力，但 Grant 明確加入耐久性（資源多久會貶值）和回報佔有（誰獲利）的維度。" },
      { q: "下列哪個因素使台積電的製程最難被模仿？", opts: ["設備價格昂貴","因果模糊（良率涉及上千變數）","專利保護","政府補貼"], ans: 1, exp: "台積電的良率涉及數千個製程變數的交互作用（因果模糊），加上 30 年路徑依賴，構成最強模仿障礙。" },
      { q: "VRIO 中的 O 代表什麼？", opts: ["Opportunity","Organization","Optimization","Outsourcing"], ans: 1, exp: "VRIO 的 O = Organization（有組織），指企業是否有適當的組織架構來充分利用其資源的潛力。" }
    ],

    // M5
    m5_nav: "5. 利潤與知識基礎觀",
    m5_title: "資源、利潤與知識基礎觀",
    m5_p1: "RBV 解釋了兩種超額利潤的來源：壟斷租金（monopoly rents，來自市場力量，受進入障礙保護）與 Ricardian 租金（來自優越的資源，以 David Ricardo 對肥沃土地的分析命名）。多數可持續的競爭優勢最終都可追溯到策略性有價值的資源所有權，暗示產業吸引力本身可能源自資源所有權。",
    m5_p2: "「一個人只因優勢而獲得報酬；沒有人因劣勢而獲得報酬。」——Peter Drucker",
    m5_p3: "Grant 的知識基礎觀（KBV）延伸了 RBV，主張知識是最具策略意義的資源，因為它最難轉移和複製。Nonaka 的架構辨識了四種知識轉換模式：社會化（默會→默會）、外化（默會→顯性）、組合（顯性→顯性）、內化（顯性→默會）。能有效管理這個循環的企業——生成、分享、制度化知識——能隨時間累積越來越強大的能力。",
    m5_cards: [
      { title: "Ricardian 租金 vs. 壟斷租金", desc: "壟斷租金來自市場力量（寡佔、法規保護）。Ricardian 租金來自稀缺、優越的資源——如 Ricardo 模型中的肥沃農地，或 Dolby 的音響技術在 2014 年賺取 8.79 億美元權利金。RBV 聚焦於後者。" },
      { title: "KBV：知識是能力的根源", desc: "知識是最難模仿的資源，因為默會知識（know-how、判斷力、體現的技能）抗拒編碼與轉移。Prahalad & Hamel 的「核心能力」概念與 KBV 相符——最深層的能力根植於競爭者無法購買或複製的知識。" }
    ],
    m5_case_title: "微個案：工研院（ITRI）——台灣的知識創造引擎",
    m5_case: "工研院（Industrial Technology Research Institute）於 1973 年成立，是台灣最重要的國家級研發機構，也是 Nonaka 知識轉換循環的國家級示範。社會化（默會→默會）：工程師在聯合實驗室中與產業夥伴並肩工作，傳遞難以言傳的研發經驗。外化（默會→顯性）：透過專利、技術報告、標準規範等形式，將默會知識轉化為可記錄的顯性知識——工研院全球持有超過 25,000 項專利。組合（顯性→顯性）：透過技術移轉創造衍生企業（台積電、聯電、世界先進等數十家 IC 設計公司）。內化（顯性→默會）：回流產業界的工程師帶走了具身化的知識。結果：工研院已孵化超過 300 家企業，累計創造超過 3 兆新台幣的產業營收。",
    m5_case_lesson: "啟示：工研院是 Nonaka 知識轉換循環的活教材——系統性地將政府研發投資轉化為具競爭力的產業。台灣半導體產業的成功，根本上就是一個知識基礎觀的成功故事。",
    m5_terms: [
      { front: "Ricardian 租金", back: "以經濟學家 David Ricardo 命名：因擁有稀缺、優越的資源而獲得的超額利潤。如同 Ricardo 模型中肥沃的農地相較於貧瘠土地產生的超額收益，企業因擁有獨特資源而獲得超出常態的報酬。" },
      { front: "知識基礎觀 KBV", back: "Knowledge-Based View：RBV 的延伸，主張知識是最重要的策略資源。因為默會知識（tacit knowledge）極難編碼和轉移，以知識為基礎的能力構成最強的持久競爭優勢。" },
      { front: "SECI 知識轉換模型", back: "Nonaka 提出的四種知識轉換模式：Socialization（社會化，默會→默會）、Externalization（外化，默會→顯性）、Combination（組合，顯性→顯性）、Internalization（內化，顯性→默會）。" }
    ],
    m5_q: [
      { q: "Ricardian 租金的來源是什麼？", opts: ["市場壟斷力量","擁有稀缺且優越的資源","政府補貼","價格操控"], ans: 1, exp: "Ricardian 租金以 Ricardo 命名：擁有稀缺的優越資源（如肥沃土地或獨特技術）而獲得的超額利潤。" },
      { q: "KBV 認為哪種資源最具策略意義？", opts: ["財務資源","實體資產","知識","品牌"], ans: 2, exp: "知識基礎觀主張知識——特別是默會知識——是最難轉移和複製的，因此是最具策略意義的資源。" },
      { q: "Nonaka 知識轉換中的「社會化」是什麼？", opts: ["顯性→顯性","默會→默會","默會→顯性","顯性→默會"], ans: 1, exp: "社會化是默會知識到默會知識的轉換——透過觀察、模仿和共同實踐，傳遞難以言傳的經驗知識。" },
      { q: "工研院對台灣產業最重要的貢獻機制是什麼？", opts: ["直接製造產品","系統性的知識轉換與技術移轉","提供低利貸款","設定產業標準"], ans: 1, exp: "工研院透過 Nonaka 的 SECI 循環，將研發知識系統性轉化為產業能力，孵化出台積電等 300 多家企業。" },
      { q: "默會知識為何構成最強的模仿障礙？", opts: ["可以申請專利","難以編碼、記錄和轉移","價格昂貴","只存在於大企業"], ans: 1, exp: "默會知識（判斷力、直覺、體現的技能）抗拒編碼——你無法把它寫成手冊，因此競爭者極難模仿。" },
      { q: "壟斷租金與 Ricardian 租金的主要差異是什麼？", opts: ["前者來自市場力量，後者來自優越資源","前者更持久","前者更合法","兩者完全相同"], ans: 0, exp: "壟斷租金源於市場力量（進入障礙、寡佔），Ricardian 租金源於擁有稀缺且優越的資源。RBV 聚焦後者。" },
      { q: "Prahalad & Hamel 的「核心能力」概念與 KBV 有什麼關係？", opts: ["完全矛盾","核心能力根植於知識，與 KBV 一致","核心能力取代了 KBV","沒有關係"], ans: 1, exp: "核心能力的深層基礎是組織知識——特別是默會知識的累積與整合，這與 KBV 的核心主張完全一致。" },
      { q: "Peter Drucker 的名言「一個人只因優勢而獲得報酬」暗示什麼策略含義？", opts: ["企業應專注於修補弱點","企業應專注於發揮和強化既有資源優勢","弱點不重要","所有企業優勢相同"], ans: 1, exp: "Drucker 的洞見支持 RBV：策略的核心是辨識、培養並發揮企業獨特的資源優勢，而非僅修補弱點。" }
    ],

    m1_nav: "1. From Industry to Firm",
    m1_title: "From Industry to Firm: Why Look Inside?",
    m1_p1: "Strategy traditionally focused on industry attractiveness (Porter's Five Forces), but multiple empirical studies show industry factors explain less than 20% of inter-firm profit variance. Rumelt's (1991) landmark study found firm-specific factors (business-unit effects) explain 44.2% of ROA variance, while industry factors explain only 4%. This paradigm shift from 'outside-in' to 'inside-out' laid the theoretical foundation for RBV.",
    m1_p2: "\"When the external environment is in a state of flux, the firm itself—in terms of the bundle of resources and capabilities it possesses—may be a much more stable basis upon which to define its identity.\" — Grant",
    m1_p3: "RBV's value model explains sources of superior profitability: Superior Profit = Higher Customer Value (V-P) and/or Lower Cost (C). Toyota outperforms GM not only by creating higher customer utility (quality, reliability) but also by maintaining lower costs (lean production). This advantage stems from firm-specific resources and capabilities, not industry structure.",
    m1_cards: [
      { title: "Outside-In vs. Inside-Out", desc: "Industry focus (Porter) vs. Resource focus (RBV). Both matter, but in turbulent environments, internal resources provide a more stable strategic foundation. Grant argues resources are the starting point of strategy, not product-market positioning." },
      { title: "The Root of Inter-Firm Performance Differences", desc: "Schmalensee found industry explains only 19.6% of ROA variance; Rumelt found firm-specific effects explain 44.2%. McGahan & Porter (1997) confirmed firm effects far exceed industry effects. The firm itself is the primary driver of profitability." }
    ],
    m1_case_title: "Micro-Case: HTC's Rise & Fall — Same Industry, Different Fortunes",
    m1_case: "HTC and Apple operated in the same smartphone industry, facing identical industry structure and suppliers (Qualcomm chips, TSMC foundry), yet met vastly different fates. HTC launched the world's first Android phone in 2008, peaking at 9% global market share in 2011. However, HTC lacked Apple's brand equity, ecosystem capabilities, and design culture—all firm-specific intangible resources. By 2017, HTC sold its smartphone brand to Google for $1.1 billion. Industry attractiveness was identical for both; what differed was firm-level resources and capabilities.",
    m1_case_lesson: "Insight: HTC's case perfectly illustrates Rumelt's finding—industry factors cannot explain the vast performance differences between firms in the same industry. Firm-specific resources and capabilities are the key.",
    m1_terms: [
      { front: "Resource-Based View (RBV)", back: "A firm's sustainable competitive advantage derives from its unique, valuable, and hard-to-imitate resources and capabilities, not merely from industry positioning. Founded by Wernerfelt (1984) and Barney (1991)." },
      { front: "Business-Unit Effects", back: "Rumelt (1991) found firm-specific factors explain 44.2% of ROA variance vs. only 4% for industry factors. This empirical finding is one of the strongest pieces of evidence supporting RBV." },
      { front: "Value Creation Model", back: "Superior profit = High customer value (V-P) and/or Low cost (C). Firms leverage internal resources and capabilities to outperform competitors in value creation or cost control." }
    ],
    m1_q: [
      { q: "Rumelt (1991) found firm-specific factors explain approximately what % of ROA variance?", opts: ["4%","19.6%","44.2%","80%"], ans: 2, exp: "Rumelt's key finding: firm-specific factors explain 44.2% of ROA variance vs. only 4% for industry factors." },
      { q: "According to RBV, what should be the starting point of strategy?", opts: ["Industry structure analysis","Internal resources and capabilities","Competitor analysis","Market segmentation"], ans: 1, exp: "RBV argues strategy should start from identifying and cultivating unique internal resources and capabilities (inside-out)." },
      { q: "Which best represents 'outside-in' strategic thinking?", opts: ["VRIN analysis","Porter's Five Forces","Core competence theory","Knowledge-based view"], ans: 1, exp: "Porter's Five Forces analyzes competitive environment from industry structure—the classic 'outside-in' approach." },
      { q: "According to Grant, what provides a more stable basis for identity in turbulent environments?", opts: ["Market positioning","Industry structure","Firm's resources and capabilities","Government policy"], ans: 2, exp: "Grant argues that when the environment is in flux, the firm's bundle of resources and capabilities is a more stable foundation." },
      { q: "What core RBV argument does the HTC case best illustrate?", opts: ["Industry structure determines profits","Firms in the same industry perform similarly","Firm-specific resources determine competitive advantage","Technology leaders always win"], ans: 2, exp: "HTC and Apple were in the same industry but differed vastly in firm-specific resources (brand, ecosystem, design capability)." },
      { q: "What is the source of Toyota's advantage over GM?", opts: ["Larger market size","Higher customer value + lower costs","Government protection","Earlier market entry"], ans: 1, exp: "Toyota's lean production achieves both higher quality (high V-P) and lower costs (low C)—from firm-specific capabilities." },
      { q: "What did McGahan & Porter (1997) confirm?", opts: ["Industry effects exceed firm effects","Firm effects exceed industry effects","Both effects are equal","Neither is significant"], ans: 1, exp: "McGahan & Porter confirmed firm effects (32%) far exceed industry effects (19%), supporting RBV's core argument." },
      { q: "Who are the founding scholars of RBV?", opts: ["Porter & Mintzberg","Wernerfelt & Barney","Schumpeter & D'Aveni","Kim & Mauborgne"], ans: 1, exp: "Wernerfelt's (1984) seminal paper and Barney's (1991) VRIN framework are RBV's theoretical cornerstones." }
    ],

    m2_nav: "2. Identifying Resources",
    m2_title: "Identifying & Classifying Resources",
    m2_p1: "Resources are the productive assets controlled by a firm—the building blocks of competitive advantage. Grant classifies them into three types: tangible (financial, physical), intangible (technology, reputation, culture), and human (skills, motivation, social intelligence). The critical distinction: intangible resources typically hold the highest strategic value because they are harder to transfer, replicate, or substitute.",
    m2_p2: "\"Among the most important of undervalued or unvalued intangible resources are brands.\" — Grant",
    m2_p3: "Financial statements often fail to reflect resources' true strategic value. The gap between market capitalization and book value represents intangible resources. Apple's brand alone is valued at $500B+, yet the balance sheet only shows physical assets. Resources conferring sustainable advantage must possess Barney's VRIN properties: Valuable, Rare, Inimitable, and Non-substitutable.",
    m2_cards: [
      { title: "Intangible Resources: The Hidden Value", desc: "The gap between book and market value reflects intangible resources. Technology (patents, trade secrets, innovation), reputation (brands, customer relationships), and culture (organizational values, employee identification) are the three intangible categories. They are the most valuable yet hardest to manage." },
      { title: "Four Sources of Inimitability", desc: "(1) Physical uniqueness—irreproducible location, patent; (2) Path dependency—built through unique historical accumulation; (3) Causal ambiguity—competitors can't identify what to copy; (4) Social complexity—interpersonal networks that can't be engineered. These constitute the strongest imitation barriers." }
    ],
    m2_case_title: "Micro-Case: MediaTek's IP Arsenal — Intangible Resources as Competitive Foundation",
    m2_case: "MediaTek's competitive advantage perfectly demonstrates the strategic value of intangible resources. In tangible resources, MediaTek has R&D facilities and chip design labs. But the real moat is intangible: 40,000+ global patents, strong brand reputation among Chinese OEMs, and a unique high-performance-at-low-cost design methodology. Human resources: ~20,000 engineers, 80%+ with advanced degrees. MediaTek's advantage shows clear path dependency (25+ years of chip design knowledge) and causal ambiguity (how they achieve high performance at low cost is hard to reverse-engineer). Result: MediaTek's Dimensity 9300 competes with Qualcomm's Snapdragon at significantly lower cost.",
    m2_case_lesson: "Insight: MediaTek demonstrates how intangible resources (patents, reputation, design methodology) combined with human resources (elite engineering teams) create durable advantages through path dependency and causal ambiguity that competitors cannot replicate.",
    m2_terms: [
      { front: "Tangible Resources", back: "Quantifiable physical assets reflected on financial statements. Includes financial resources (cash, credit) and physical resources (plants, equipment, land, minerals). Typically lower strategic value since competitors can acquire them." },
      { front: "Intangible Resources", back: "Non-physical assets not fully reflected on financial statements. Includes technology (patents, trade secrets), reputation (brands, customer trust), and culture (organizational values). Usually the most strategically valuable resource category." },
      { front: "Causal Ambiguity", back: "Competitors cannot identify the specific sources of a firm's competitive advantage, thus cannot effectively imitate. Strongest when advantage arises from complex interactions among multiple resources. A key source of inimitability." }
    ],
    m2_q: [
      { q: "How does Grant classify firm resources?", opts: ["Financial, technical, market","Tangible, intangible, human","Capital, labor, land","Core, supporting, peripheral"], ans: 1, exp: "Grant's classification: tangible (financial, physical), intangible (technology, reputation, culture), and human (skills, motivation)." },
      { q: "Which resource type typically has the highest strategic value?", opts: ["Tangible","Financial","Intangible","Physical"], ans: 2, exp: "Intangible resources (brands, patents, culture) typically have the highest strategic value due to being hard to transfer, replicate, and substitute." },
      { q: "What does the gap between market cap and book value primarily reflect?", opts: ["Accounting errors","Value of intangible resources","Inflation effects","Market speculation"], ans: 1, exp: "The excess of market value over book value represents intangible resources (brands, IP, organizational capabilities)." },
      { q: "Which best exemplifies 'path dependency'?", opts: ["Purchasing new equipment","Long-accumulated organizational culture","Hiring new employees","Price promotions"], ans: 1, exp: "Path dependency means resources are built through unique historical processes and cannot be replicated through short-term investment." },
      { q: "Why does causal ambiguity prevent imitation?", opts: ["Legal protection","Competitors don't know what to imitate","Too expensive","Market too small"], ans: 1, exp: "When advantage arises from complex resource interactions, competitors cannot identify the specific success factors to imitate." },
      { q: "MediaTek's core competitive advantage primarily comes from which resource type?", opts: ["Tangible manufacturing equipment","Intangible patents and design methodology","Government subsidies","Cheap labor"], ans: 1, exp: "MediaTek's 40,000+ patents, unique design methodology, and brand reputation are all intangible resources forming its core advantage." },
      { q: "What are the four sources of Inimitability in VRIN?", opts: ["Innovation, investment, integration, internationalization","Physical uniqueness, path dependency, causal ambiguity, social complexity","Price, quality, speed, service","Scale, scope, learning, network"], ans: 1, exp: "Barney identified four sources of inimitability: physical uniqueness, path dependency, causal ambiguity, and social complexity." },
      { q: "Which of the following is a human resource?", opts: ["Factory equipment","Brand reputation","Employees' skills and motivation","Patent portfolio"], ans: 2, exp: "Human resources include employees' knowledge, skills, communication ability, motivation, and social intelligence. They reside in individuals, not the organization." }
    ],

    m3_nav: "3. Capabilities & Value Chain",
    m3_title: "Organizational Capabilities & Value Chain",
    m3_p1: "Resources alone don't create value. A brain surgeon is useless without anesthesiologists, nurses, and imaging equipment. Organizational capability is 'a firm's capacity to deploy resources for a desired end result' (Helfat & Lieberman). Key distinction: a resource is what a firm has; a capability is what a firm can do.",
    m3_p2: "\"At the basis of every organizational capability is coordinated behavior among organizational members.\" — Grant",
    m3_p3: "Porter's value chain provides a systematic framework for identifying capabilities. The capability hierarchy runs from: specialized/single-task capabilities (e.g., automated wave soldering) → activity-related capabilities (e.g., materials management) → broad functional capabilities (e.g., operations) → cross-functional capabilities (e.g., new product development). Superior performance results from unique combinations at higher levels.",
    m3_cards: [
      { title: "Capabilities ≠ Sum of Resources", desc: "Resource-rich teams (Chelsea, Real Madrid) are often outplayed by resource-modest teams with superior capabilities (Dortmund, Arsenal). In business too: resource-modest startups routinely outcompete established giants through superior capabilities (Dyson vs. Electrolux, Hyundai vs. Toyota)." },
      { title: "Value Chain as Capability Map", desc: "The value chain dissects the firm into primary activities (inbound logistics, operations, outbound logistics, marketing & sales, service) and support activities (firm infrastructure, HR, technology development, procurement). Each activity is a potential source of competitive advantage." }
    ],
    m3_case_title: "Micro-Case: Foxconn (Hon Hai) — Manufacturing Capability as Strategic Asset",
    m3_case: "Foxconn's tangible resources are impressive: 1.2 million employees, 30+ global manufacturing complexes, advanced automation. But Foxconn's real advantage lies in organizational capabilities: precision manufacturing processes, just-in-time logistics, and rapid scale-up capacity. Its cross-functional capability is remarkable—ramping iPhone production from 0 to 500,000 units/day within weeks. This isn't just about machinery; it's the coordinated integration of procurement, process engineering, quality management, and HR systems. Foxconn's capability shows clear path dependency (40+ years of manufacturing knowledge) and social complexity (supplier relationship networks, employees' tacit know-how). This is why Apple cannot easily replace Foxconn despite supply chain concentration concerns.",
    m3_case_lesson: "Insight: Foxconn demonstrates that organizational capabilities (not resources per se) are the true source of competitive advantage. Its manufacturing capability is what makes Apple's hardware strategy viable—capabilities cannot be purchased with money, only built through long-term organizational learning.",
    m3_terms: [
      { front: "Organizational Capability", back: "A firm's capacity to deploy resources for a desired end result. Capabilities are not the simple sum of resources but products of coordinated behavior among organizational members. They reflect what a firm 'can do' rather than what it 'has.'" },
      { front: "Value Chain", back: "Porter's analytical tool dividing firm activities into primary (inbound, operations, outbound, marketing, service) and support activities (infrastructure, HR, technology, procurement) to identify competitive advantage sources in each." },
      { front: "Capability Hierarchy", back: "From bottom to top: specialized capabilities → activity-related capabilities → functional capabilities → cross-functional capabilities. Higher-level capabilities are harder to imitate but also harder to manage and develop." }
    ],
    m3_q: [
      { q: "What is the key distinction between resources and capabilities?", opts: ["Resources are more important","Resources are what firms have; capabilities are what firms can do","They are identical","Capabilities only exist in manufacturing"], ans: 1, exp: "Resources are input factors (assets firms own); capabilities are the ability to transform resources into outcomes." },
      { q: "According to Grant, what is the foundation of organizational capability?", opts: ["Advanced technology","Sufficient funding","Coordinated behavior among members","Market share"], ans: 2, exp: "Grant emphasizes that every organizational capability is based on coordinated behavior among organizational members." },
      { q: "What is the highest level in the capability hierarchy?", opts: ["Specialized capabilities","Functional capabilities","Cross-functional capabilities","Activity-related capabilities"], ans: 2, exp: "Cross-functional capabilities (e.g., new product development) integrate multiple departments and are hardest to imitate." },
      { q: "Which is NOT a primary activity in the value chain?", opts: ["Operations","Marketing & sales","Human resource management","After-sales service"], ans: 2, exp: "HR management is a support activity. Primary activities: inbound logistics, operations, outbound logistics, marketing & sales, service." },
      { q: "What is Foxconn's core competitive advantage based on?", opts: ["Cheap labor","Organizational-level manufacturing capabilities","Government subsidies","Brand effect"], ans: 1, exp: "Foxconn's advantage lies not just in equipment or labor, but in integrating procurement, engineering, QC, and HR into organizational capability." },
      { q: "Why doesn't 'resource-rich' equal 'capability-strong'?", opts: ["Resources don't matter","Resources need coordination and integration to become capabilities","Resources depreciate","Capabilities don't need resources"], ans: 1, exp: "Even with the most expensive players (resources), without coordination (capabilities), you can't win matches." },
      { q: "Which is an example of cross-functional capability?", opts: ["Automated welding","Warehouse management","New product development","Accounting"], ans: 2, exp: "New product development requires coordination across R&D, marketing, production, and finance—a typical cross-functional capability." },
      { q: "Why can't Apple easily replace Foxconn?", opts: ["Contractual restrictions","Foxconn's capabilities show path dependency and social complexity","Foxconn's lowest price","Legal restrictions"], ans: 1, exp: "Foxconn's 40-year manufacturing knowledge (path dependency) and supplier networks (social complexity) cannot be replicated." }
    ],

    m4_nav: "4. VRIN/VRIO Appraisal",
    m4_title: "Appraising Resources & Capabilities (VRIN/VRIO)",
    m4_p1: "Identifying resources is only half the task. Appraising them requires answering: (1) How strategically important is this resource? (2) How strong is it relative to competitors? Grant's framework evaluates strategic importance through three lenses: potential to establish competitive advantage (relevance, scarcity), sustain it (durability, transferability, replicability), and appropriate the returns (property rights, bargaining power, embeddedness).",
    m4_p2: "\"The resource-based approach has profound implications for companies' strategy formulation. When the primary concern of strategy was industry positioning, the primary task was to select an industry.\" — Grant",
    m4_p3: "Grant's framework creates a 2×2 matrix of strategic importance vs. relative strength. Key Strengths (high importance, high strength) should be aggressively deployed; Key Weaknesses (high importance, low strength) require urgent action—through improvement, outsourcing, or clever strategy. Harley-Davidson, facing a technology gap, repositioned its brand around 'classic American culture' rather than 'technology leadership,' cleverly negating the weakness.",
    m4_cards: [
      { title: "Grant vs. Barney: Two Frameworks, Same Goal", desc: "Grant: relevance, scarcity, durability, transferability, replicability, property rights, bargaining power, embeddedness. Barney's VRIO: Valuable, Rare, Inimitable, Organized. Both assess competitive advantage potential; Grant adds durability and appropriability as explicit dimensions." },
      { title: "Appropriating Returns: Who Gets the Rent?", desc: "Investment banks (Goldman Sachs) have outstanding capabilities—but employees often appropriate more value than shareholders. The more individual-specific a capability, the stronger employees' bargaining power. This explains why many firms emphasize team-based over individual-star capabilities." }
    ],
    m4_case_title: "Micro-Case: TSMC — A Perfect VRIN Resource Analysis",
    m4_case: "Applying VRIN to TSMC's advanced manufacturing: Valuable—3nm/2nm chips power every major AI workload, directly addressing customers' most critical needs. Rare—only TSMC and Samsung can manufacture at leading-edge nodes; only TSMC does so profitably at scale. Inimitable—path dependency (30+ years of co-developed process R&D with ASML, Applied Materials), causal ambiguity (yield success involves thousands of variables), social complexity (decades of customer trust built through pure-play model). Non-substitutable—no alternative manufacturing route for cutting-edge AI chips. Result: TSMC's 2024 gross margins exceeded 53%, earning Ricardian rents competitors cannot match.",
    m4_case_lesson: "Insight: TSMC is a textbook VRIN case—every dimension is satisfied, yielding extremely high sustainable competitive advantage. This is why TSMC's 'moat' is so impregnable.",
    m4_terms: [
      { front: "VRIN Framework", back: "Barney's resource appraisal: Valuable, Rare, Inimitable, Non-substitutable. When all four conditions are met, the resource confers sustainable competitive advantage." },
      { front: "Durability", back: "A key dimension in Grant's framework: How long can the resource maintain its value? Brand reputation may last decades, but technology resources may quickly become obsolete in fast-changing industries." },
      { front: "Appropriability", back: "Who profits from value created by the resource? Depends on property rights clarity, key employees' bargaining power, and capability embeddedness in the organization. The more individual-dependent, the harder for the firm to appropriate returns." }
    ],
    m4_q: [
      { q: "What are Grant's three dimensions for evaluating strategic importance?", opts: ["Scale, scope, speed","Establishing advantage, sustaining advantage, appropriating returns","Cost, quality, innovation","Market, technology, organization"], ans: 1, exp: "Grant evaluates through three lenses: potential to establish competitive advantage, sustain it, and appropriate the returns." },
      { q: "In Grant's 2×2 matrix, what does 'high strategic importance, low relative strength' represent?", opts: ["Key Strength","Key Weakness","Surplus resource","Irrelevant"], ans: 1, exp: "This represents a Key Weakness—the resource matters for competition but the firm lags, requiring urgent improvement or strategic workaround." },
      { q: "How did Harley-Davidson overcome its technology weakness?", opts: ["Massive tech investment","Repositioned brand around American culture, not technology","Abandoned the market","Acquired tech companies"], ans: 1, exp: "Harley didn't try to catch Japanese rivals technologically—instead, old-fashioned technology became part of its 'classic' brand charm." },
      { q: "Which VRIN conditions does TSMC's advanced manufacturing satisfy?", opts: ["Only V and R","Only V, R, and I","All four (V, R, I, N)","Only V"], ans: 2, exp: "TSMC satisfies all four: Valuable, Rare, Inimitable (path dependency + causal ambiguity + social complexity), and Non-substitutable." },
      { q: "Why might investment bank shareholders earn less than expected?", opts: ["Industry downturn","Key employees appropriate significant value","Technology obsolescence","Client loss"], ans: 1, exp: "Investment banking capabilities are highly individual-dependent; star traders and analysts have strong bargaining power, capturing much of the economic rent." },
      { q: "What is the main difference between Grant's and Barney's frameworks?", opts: ["Completely different theories","Grant adds durability and appropriability dimensions","Barney is more comprehensive","No difference"], ans: 1, exp: "Both assess competitive advantage potential, but Grant explicitly adds durability (how long value lasts) and appropriability (who profits)." },

const ModuleQuiz = ({ questions, t, moduleId, onQuizSubmit }) => {
  const [selected, setSelected] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [quizIndices] = useState(() => [...Array(questions.length).keys()].sort(() => Math.random() - 0.5).slice(0, 4));
  const handleSubmit = () => {
    if (Object.keys(selected).length < quizIndices.length) return;
    const c = quizIndices.filter((qIdx, i) => selected[i] === questions[qIdx].ans).length;
    setSubmitted(true);
    onQuizSubmit(moduleId, c, quizIndices.length);
  };
  const correctCount = submitted ? quizIndices.filter((qIdx, i) => selected[i] === questions[qIdx].ans).length : 0;
  return (
    <div className="mt-8 bg-slate-50 dark:bg-slate-900 rounded-2xl p-4 sm:p-6 border border-slate-200 dark:border-slate-700">
      <h3 className="font-serif font-bold text-xl text-[#004030] dark:text-[#D8C3A5] mb-6 flex items-center"><IconBookOpen size={20} className="mr-2"/>{t.quiz_title}</h3>
      {quizIndices.map((qIdx, qi) => {
        const q = questions[qIdx];
        return (
          <div key={qIdx} className="mb-6">
            <p className="font-semibold text-slate-800 dark:text-slate-200 mb-3">{qi+1}. {q.q}</p>
            <div className="space-y-2">{q.opts.map((opt, oi) => {
              let cls = "w-full text-left px-4 py-2.5 rounded-lg border text-sm transition-colors ";
              if (!submitted) cls += selected[qi] === oi ? "border-[#004030] bg-[#004030]/10 dark:bg-[#D8C3A5]/10 text-[#004030] dark:text-[#D8C3A5] font-semibold" : "border-slate-200 dark:border-slate-600 hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300";
              else if (oi === q.ans) cls += "border-green-500 bg-green-50 dark:bg-green-900/20 text-green-700 dark:text-green-400 font-semibold";
              else if (selected[qi] === oi) cls += "border-red-400 bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400";
              else cls += "border-slate-200 dark:border-slate-600 text-slate-500";
              return <button key={oi} onClick={() => !submitted && setSelected(s=>({...s,[qi]:oi}))} className={cls}>{opt}</button>;
            })}</div>
            {submitted && <p className="mt-2 text-sm text-slate-600 dark:text-slate-400 italic">{t.explanation}: {q.exp}</p>}
          </div>
        );
      })}
      {!submitted ? (
        <button onClick={handleSubmit} disabled={Object.keys(selected).length < quizIndices.length}
          className="px-6 py-2.5 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40 hover:bg-[#002b20] transition-colors">{t.submit}</button>
      ) : (
        <div className="flex items-center space-x-4">
          <span className="font-bold text-lg text-[#004030] dark:text-[#D8C3A5]">{t.score}: {correctCount}/{quizIndices.length}</span>
          <button onClick={() => { setSelected({}); setSubmitted(false); }} className="px-4 py-2 border border-[#004030] dark:border-[#D8C3A5] text-[#004030] dark:text-[#D8C3A5] rounded-lg hover:bg-[#004030]/10 text-sm font-semibold transition-colors">{t.retry}</button>
        </div>
      )}
    </div>
  );
};

  const [ttsState, setTtsState] = useState('idle');

  const [analytics, setAnalytics] = useState({ time: Array(N).fill(0), clicks: Array(N).fill(0), quizCorrect: Array(N).fill(0), quizTotal: Array(N).fill(0) });
  const contentRef = useRef(null);
  const timerRef = useRef(null);
  const t = dict[lang];

  useEffect(() => { isDark ? document.documentElement.classList.add('dark') : document.documentElement.classList.remove('dark'); }, [isDark]);
  useEffect(() => {
    window.speechSynthesis && window.speechSynthesis.cancel(); setTtsState('idle');
    window.scrollTo({top:0,behavior:'smooth'});
    if (timerRef.current) clearInterval(timerRef.current);
    const mi = module - 1;
    if (mi >= 0 && mi < N) { timerRef.current = setInterval(() => { setAnalytics(a => { const t2 = [...a.time]; t2[mi]++; return {...a, time: t2}; }); }, 1000); }
    return () => clearInterval(timerRef.current);
  }, [module]);

  const handleClick = () => { const mi = module - 1; if (mi >= 0 && mi < N) setAnalytics(a => { const c = [...a.clicks]; c[mi]++; return {...a, clicks: c}; }); };
  const handleQuizSubmit = (modId, correct, total) => { const mi = modId - 1; if (mi >= 0 && mi < N) setAnalytics(a => { const qc=[...a.quizCorrect]; const qt=[...a.quizTotal]; qc[mi]=correct; qt[mi]=total; return {...a, quizCorrect:qc, quizTotal:qt}; }); };

  const handleTTS = (action) => {
    if (!('speechSynthesis' in window)) return;
    if (action === 'stop') { window.speechSynthesis.cancel(); setTtsState('idle'); return; }
    if (action === 'pause') { window.speechSynthesis.pause(); setTtsState('paused'); return; }
    if (action === 'play') {
      if (ttsState === 'paused') { window.speechSynthesis.resume(); setTtsState('playing'); return; }
      window.speechSynthesis.cancel();
      const sep = lang === 'zh' ? '。 ' : '. ';
      let texts = [];
      if (module === 0) { texts = [t.m0_title, t.m0_intro, t.m0_why, t.m0_why_desc].filter(Boolean); }
      else if (module >= 1 && module <= N) {
        const mk = `m${module}`;
        texts = [t[`${mk}_title`],t[`${mk}_p1`],t[`${mk}_p2`],t[`${mk}_p3`],...(t[`${mk}_cards`]||[]).map(c=>`${c.title}. ${c.desc}`),...(t[`${mk}_terms`]||[]).flatMap(term=>[term.front,term.back]),t[`${mk}_case_title`],t[`${mk}_case`],t[`${mk}_case_lesson`]].filter(Boolean);

      const text = texts.filter(Boolean).join(sep);

      const voices = window.speechSynthesis.getVoices();
      if (lang === 'zh') { const v = voices.find(v=>v.lang==='zh-TW'&&v.name.includes('Yating'))||voices.find(v=>v.lang==='zh-TW')||voices.find(v=>v.lang.startsWith('zh')); if(v)utterance.voice=v; utterance.lang='zh-TW'; }

      utterance.onend = () => setTtsState('idle'); utterance.onerror = () => setTtsState('idle');

          <h3 className="text-lg font-bold uppercase tracking-wider text-slate-500 mb-4">{lang==='zh'?'課程模組':'Course Modules'}</h3>
          <div className="space-y-3">{t.m0_modules.map((m,i)=>(
            <button key={i} onClick={()=>setModule(i+1)} className="w-full flex items-center gap-5 bg-white dark:bg-slate-800 rounded-xl px-6 py-4 border border-slate-200 dark:border-slate-700 hover:border-[#004030] dark:hover:border-[#D8C3A5] hover:shadow-md transition-all text-left group">
              <div className="text-3xl font-black font-serif text-[#D8C3A5] w-10 shrink-0">{m.num}</div>
              <div className="flex-1"><div className="font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-1">{m.title}</div><div className="text-sm text-slate-500">{m.desc}</div></div>
              <IconChevronRight size={20} className="text-slate-300 group-hover:text-[#004030] dark:group-hover:text-[#D8C3A5] shrink-0"/>
            </button>
          ))}</div>
        </div>
        <div className="flex justify-end">
          <button onClick={()=>setModule(1)} className="px-8 py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-serif font-bold hover:bg-[#002b20] rounded-lg shadow-md">{t.m0_start}</button>
        </div>
      </div>
    );
    if (module >= 1 && module <= N) return renderModule(module);
    if (module === N+1) return renderResources();
    if (module === N+2) return renderLab();
    if (module === N+3) {
      const totalTime = analytics.time.reduce((a,b)=>a+b,0);
      const totalClicks = analytics.clicks.reduce((a,b)=>a+b,0);
      const totalCorrect = analytics.quizCorrect.reduce((a,b)=>a+b,0);
      const totalAnswered = analytics.quizTotal.reduce((a,b)=>a+b,0);
      const overallAcc = totalAnswered > 0 ? Math.round(totalCorrect/totalAnswered*100)+'%' : t.analytics_no_data;
      const canExport = studentInfo.group && studentInfo.dept && studentInfo.id && studentInfo.name;
      const mNavKeys = ['m1_nav','m2_nav','m3_nav','m4_nav','m5_nav'];
      return (
        <div className={base}>
          <H2>{t.analytics_title}</H2>
          <p className="text-slate-500 dark:text-slate-400">{t.analytics_desc}</p>
          <div className="grid grid-cols-3 gap-4">{[{label:t.analytics_total_time,val:totalTime+t.analytics_sec},{label:t.analytics_total_clicks,val:totalClicks+t.analytics_times},{label:t.analytics_overall_acc,val:overallAcc}].map((s,i)=>(
            <div key={i} className="bg-white dark:bg-slate-800 rounded-xl p-4 border border-slate-200 dark:border-slate-700 text-center shadow-sm">
              <p className="text-2xl font-black font-serif text-[#004030] dark:text-[#D8C3A5]">{s.val}</p>
              <p className="text-xs text-slate-500 mt-1">{s.label}</p>
            </div>
          ))}</div>
          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 overflow-hidden shadow-sm">
            <table className="w-full text-sm"><thead><tr className="bg-[#004030] text-[#D8C3A5]">
              <th className="text-left p-3">{t.analytics_module}</th><th className="text-center p-3">{t.analytics_time}</th><th className="text-center p-3">{t.analytics_clicks}</th><th className="text-center p-3">{t.analytics_acc}</th><th className="text-center p-3 hidden md:table-cell">{t.analytics_correct_ans_total}</th>
            </tr></thead><tbody>{Array.from({length:N},(_,i)=>{
              const acc=analytics.quizTotal[i]>0?Math.round(analytics.quizCorrect[i]/analytics.quizTotal[i]*100)+'%':t.analytics_no_data;
              const ans=analytics.quizTotal[i]>0?`${analytics.quizCorrect[i]}/${analytics.quizTotal[i]}/8`:t.analytics_no_data;
              return <tr key={i} className="border-t border-slate-100 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700/50"><td className="p-3 font-medium text-[#004030] dark:text-[#D8C3A5]">{t[mNavKeys[i]]}</td><td className="p-3 text-center">{analytics.time[i]}{t.analytics_sec}</td><td className="p-3 text-center">{analytics.clicks[i]}{t.analytics_times}</td><td className="p-3 text-center">{acc}</td><td className="p-3 text-center hidden md:table-cell">{ans}</td></tr>;
            })}</tbody></table>
          </div>
          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-6 shadow-sm">
            <h3 className="font-serif font-bold text-lg text-[#004030] dark:text-[#D8C3A5] mb-4">{t.analytics_form_title}</h3>
            <div className="grid grid-cols-2 gap-4">
              <div><label className="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1">{t.analytics_group}</label>
                <select value={studentInfo.group} onChange={e=>setStudentInfo({...studentInfo,group:e.target.value})} className="w-full border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200"><option value="">--</option>{t.group_options.map(g=><option key={g} value={g}>{g}</option>)}</select></div>
              <div><label className="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1">{t.analytics_dept}</label>
                <input value={studentInfo.dept} onChange={e=>setStudentInfo({...studentInfo,dept:e.target.value})} placeholder={t.analytics_dept_ph} className="w-full border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200"/></div>
              <div><label className="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1">{t.analytics_id}</label>
                <input value={studentInfo.id} onChange={e=>setStudentInfo({...studentInfo,id:e.target.value})} placeholder={t.analytics_id_ph} className="w-full border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200"/></div>
              <div><label className="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1">{t.analytics_name}</label>
                <input value={studentInfo.name} onChange={e=>setStudentInfo({...studentInfo,name:e.target.value})} placeholder={t.analytics_name_ph} className="w-full border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200"/></div>
            </div>
            <button onClick={handleExportCSV} disabled={!canExport} className="mt-4 px-6 py-2.5 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40 hover:bg-[#002b20] transition-colors text-sm">{canExport?t.analytics_export_csv:t.analytics_fill_required}</button>
          </div>
          {renderNavBottom()}
        </div>
      );
    }
  };

  return (
    <div className="min-h-screen bg-[#f4f4f4] dark:bg-[#121212] font-sans selection:bg-[#004030] selection:text-white dark:selection:bg-[#D8C3A5] dark:selection:text-[#004030] flex flex-col overflow-x-hidden pt-16">
      <header className="fixed top-0 left-0 right-0 h-16 bg-[#004030] dark:bg-slate-900 text-white z-50 shadow-lg border-b border-[#D8C3A5]/30">
        <div className="max-w-7xl mx-auto px-3 sm:px-4 lg:px-6 h-16 flex items-center justify-between">
          <div className="flex items-center space-x-3">
            <div className="relative" ref={menuRef}>
              <button className="p-2 hover:bg-white/10 rounded-lg" onClick={()=>setMenuOpen(!menuOpen)}>{menuOpen?<IconX size={20}/>:<IconMenu size={20}/>}</button>
              {menuOpen && (
                <div className="absolute top-full left-0 mt-1 w-64 max-w-[calc(100vw-2rem)] max-h-[calc(100vh-5rem)] overflow-y-auto bg-white dark:bg-slate-800 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700 z-[100] overflow-x-hidden">
                  <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 px-4 py-2 border-b border-slate-200 dark:border-slate-700"><p className="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">{t.nav_modules}</p></div>
                  {modulesList.map(m=>(
                    <button key={m.id} onClick={()=>{setModule(m.id);setMenuOpen(false);}} className={`w-full flex items-center gap-3 px-4 py-3 text-sm font-medium transition-colors text-left ${module===m.id?'bg-[#004030] text-white dark:bg-[#D8C3A5]/20 dark:text-[#D8C3A5] font-bold':'text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/50'}`}>
                      <span className={module===m.id?'text-[#D8C3A5]':'opacity-50'}>{m.icon}</span><span className="truncate">{m.title}</span>
                    </button>
                  ))}
                </div>
              )}
            </div>
            <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} className="flex items-center gap-2 hover:opacity-80 transition-opacity">
              <div className="font-serif font-black text-lg tracking-widest text-[#D8C3A5]">{t.brand}</div>
              <div className="hidden sm:block text-left"><h1 className="font-serif font-bold text-sm md:text-base leading-tight">{t.title}</h1><p className="text-[10px] text-[#D8C3A5]/70">{t.subtitle}</p></div>
            </button>
          </div>
          <div className="flex items-center space-x-1">
            <div className="flex items-center space-x-1 mr-2">
              {ttsState!=='playing'?(<button onClick={()=>handleTTS('play')} title={t.audio_read} className="p-2 rounded-full hover:bg-white/10 transition-colors flex items-center space-x-1 text-xs"><IconPlay size={14}/><span className="hidden md:inline">{t.audio_read}</span></button>):(<button onClick={()=>handleTTS('pause')} className="p-2 rounded-full hover:bg-white/10 transition-colors"><IconPause size={14}/></button>)}
              {ttsState!=='idle'&&<button onClick={()=>handleTTS('stop')} className="p-2 rounded-full hover:bg-white/10 transition-colors"><IconSquare size={14}/></button>}
            </div>
            <button onClick={()=>setLang(lang==='zh'?'en':'zh')} className="px-3 py-1 rounded-full bg-white/10 hover:bg-white/20 text-sm font-bold transition-colors">{lang==='zh'?'EN':'中文'}</button>
            <button onClick={()=>setIsDark(!isDark)} className="p-2 rounded-full hover:bg-white/10 transition-colors">{isDark?<IconSun size={18}/>:<IconMoon size={18}/>}</button>
          </div>
        </div>
      </header>
      <div className="max-w-7xl mx-auto w-full px-3 sm:px-4 lg:px-6 flex-1 flex flex-col md:flex-row gap-0 py-6">
        <aside className="hidden md:block w-64 shrink-0 mr-6">
          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden sticky top-24">
            <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 px-4 py-3 border-b border-slate-200 dark:border-slate-700"><p className="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">{t.nav_modules}</p></div>
            <nav className="space-y-0.5 p-2">{modulesList.map(m=>(
              <button key={m.id} onClick={()=>{setModule(m.id);setMenuOpen(false);}} className={`w-full flex items-center px-3 py-2.5 rounded-lg text-sm font-medium transition-colors text-left ${module===m.id?'bg-[#004030] dark:bg-[#D8C3A5]/20 text-white dark:text-[#D8C3A5] border border-[#D8C3A5]/30':'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700/50'}`}>
                <span className={`mr-2.5 ${module===m.id?'text-[#D8C3A5]':'opacity-50'}`}>{m.icon}</span><span className="truncate">{m.title}</span>
                {module===m.id&&<IconChevronRight size={14} className="ml-auto opacity-50 shrink-0"/>}
              </button>
            ))}</nav>
          </div>
        </aside>
        <main ref={contentRef} className="flex-1 min-w-0" onClick={handleClick}>
          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm p-4 sm:p-6 md:p-8">{renderContent()}</div>
        </main>
      </div>
      <footer className="bg-[#004030] dark:bg-slate-950 text-slate-300 dark:text-slate-400 border-t border-[#D8C3A5]">
        <div className="max-w-7xl mx-auto px-4 h-8 flex justify-between items-center text-[10px] sm:text-xs">
          <div className="flex items-center space-x-2 md:space-x-4">
            <div className="font-serif font-black text-[#D8C3A5] hidden sm:block tracking-widest text-sm">{t.brand}</div>
            <span className="truncate">{t.copyright} · {t.date}</span>
          </div>
          <div className="flex items-center space-x-3 md:space-x-4">
            <span className="text-[#D8C3A5]/70 font-serif hidden sm:inline">Architect:&nbsp;<a href={t.architect_url} target="_blank" rel="noopener noreferrer" className="text-[#D8C3A5] hover:text-white underline underline-offset-2 transition-colors">Prof. Shihmin Lo</a></span>
            <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} className="flex items-center uppercase tracking-widest hover:text-white transition-colors border-l border-slate-600 pl-3"><IconChevronUp size={12} className="md:mr-1"/><span className="hidden sm:inline">TOP</span></button>
          </div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
